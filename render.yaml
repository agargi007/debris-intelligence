services:
  - type: web
    name: debris-intelligence-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: model-storage
      mountPath: /opt/render/project/src/backend
      sizeGB: 2
